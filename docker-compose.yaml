services:
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=exasol-exasol-datasource
    volumes:
      - ./dist:/var/lib/grafana/plugins/exasol-exasol-datasource
      - ./provisioning:/etc/grafana/provisioning
